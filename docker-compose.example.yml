# Gustarr compose example. Copy to docker-compose.yml and adjust.
#
# One image, two single-purpose services — the web UI serves the approval
# queue and nothing else; scheduling is its own process. One process, one
# job, even in a container.
#
# Config: copy gustarr.example.toml to ./gustarr.toml. For containers set
#   [core]      data_dir = "/var/lib/gustarr"
#   [model]     device   = "cpu"              # image ships CPU-only torch
#   [web]       bind     = "0.0.0.0:8790"     # reachable through the port map
#   [web]       allowed_hosts = ["nas.lan"]   # hostname you browse to (Host guard)
#   [scheduler] nightly  = "04:30"            # when the scheduler service fires
# Secrets stay out of the TOML via env:VAR — put the actual values in
# ./gustarr.env (chmod 600, gitignored). The example TOML references six:
#   JELLYFIN_API_KEY=...
#   TMDB_API_KEY=...
#   LASTFM_API_KEY=...
#   SONARR_API_KEY=...
#   RADARR_API_KEY=...
#   LIDARR_API_KEY=...
# or delete the TOML sections for services you don't run — an unset env:
# reference is a hard config error on purpose.

services:
  # long-running approval web UI — this process never runs the pipeline
  gustarr:
    image: ghcr.io/dixiao-l/gustarr:latest
    # build: .                              # or build locally
    restart: unless-stopped
    ports:
      - "8790:8790"
    env_file:
      - gustarr.env
    volumes:
      - ./gustarr.toml:/etc/gustarr/gustarr.toml:ro
      - gustarr-state:/var/lib/gustarr     # SQLite store + model cache: back this up
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8790/api/stats', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

  # fires `run nightly` at [scheduler] nightly, container-local time
  scheduler:
    image: ghcr.io/dixiao-l/gustarr:latest
    command: ["schedule"]
    restart: unless-stopped
    env_file:
      - gustarr.env
    # environment:
    #   TZ: Europe/Berlin
    volumes:
      - ./gustarr.toml:/etc/gustarr/gustarr.toml:ro
      - gustarr-state:/var/lib/gustarr

  # Prefer host cron? Drop the scheduler service and run one-shots:
  #
  #   30 4 * * *  cd /opt/gustarr && docker compose run --rm gustarr run nightly

volumes:
  gustarr-state:
