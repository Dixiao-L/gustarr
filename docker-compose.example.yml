# Gustarr compose example. Copy to docker-compose.yml and adjust.
#
# Config: copy gustarr.example.toml to ./gustarr.toml. For containers set
#   [core]      data_dir = "/var/lib/gustarr"
#   [model]     device   = "cpu"              # image ships CPU-only torch
#   [web]       bind     = "0.0.0.0:8790"     # reachable through the port map
#   [web]       allowed_hosts = ["nas.lan"]   # hostname you browse to (Host guard)
#   [scheduler] nightly  = "04:30"            # built-in scheduler: the web
#                                             # container runs the pipeline
#                                             # itself — no host cron needed
# Secrets stay out of the TOML via env:VAR — put the actual values in
# ./gustarr.env (chmod 600, gitignored):
#   TMDB_API_KEY=...
#   LASTFM_API_KEY=...
#   SONARR_API_KEY=...

services:
  # long-running approval web UI — with [scheduler] set, also the nightly
  # pipeline's launcher (it runs as a subprocess; start/exit land in the
  # container logs)
  gustarr:
    image: ghcr.io/dixiao-l/gustarr:latest
    # build: .                              # or build locally
    restart: unless-stopped
    ports:
      - "8790:8790"
    env_file:
      - gustarr.env
    # environment:
    #   TZ: Europe/Berlin                   # [scheduler] fires in container-local time
    volumes:
      - ./gustarr.toml:/etc/gustarr/gustarr.toml:ro
      - gustarr-state:/var/lib/gustarr     # SQLite store + model cache: back this up
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8790/api/stats', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Prefer pipelines outside the web container (separate logs/limits)?
  # Leave [scheduler] unset and run one-shots from host cron instead:
  #
  #   30 4 * * *  cd /opt/gustarr && docker compose run --rm gustarr run nightly
  #   0  9 * * 6  cd /opt/gustarr && docker compose run --rm gustarr run weekly
  #
  # ...or uncomment this one-shot service and use `docker compose run pipeline`:
  #
  # pipeline:
  #   image: ghcr.io/dixiao-l/gustarr:latest
  #   profiles: ["cron"]                   # never started by `up`
  #   command: ["run", "nightly"]
  #   env_file:
  #     - gustarr.env
  #   volumes:
  #     - ./gustarr.toml:/etc/gustarr/gustarr.toml:ro
  #     - gustarr-state:/var/lib/gustarr

volumes:
  gustarr-state:
