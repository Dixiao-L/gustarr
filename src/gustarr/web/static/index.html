<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="description" content="Gustarr approval queue — review, snooze, or approve
  recommended movies, series, and music.">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#18181c">
<title>Gustarr</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Cg%20fill='%2314b8a6'%3E%3Crect%20x='4'%20y='13'%20width='4'%20height='7'%20rx='2'%20opacity='.4'/%3E%3Crect%20x='10'%20y='9'%20width='4'%20height='11'%20rx='2'%20opacity='.7'/%3E%3Crect%20x='16'%20y='4'%20width='4'%20height='16'%20rx='2'/%3E%3C/g%3E%3C/svg%3E">
<style>
  :root {
    --bg: #f7f7f8; --surface: #ffffff; --text: #18181b; --muted: #6b7280;
    --line: #e4e4e7; --line-strong: #d4d4d8;
    --accent: #0f766e; --accent-hover: #115e59; --on-accent: #ffffff;
    --accent-text: #0f766e; --accent-soft: rgba(15, 118, 110, .09);
    --danger: #b91c1c; --danger-soft: rgba(185, 28, 28, .08);
    --warn: #b45309; --warn-soft: rgba(180, 83, 9, .09);
    --shadow: 0 1px 2px rgba(0, 0, 0, .04), 0 1px 3px rgba(0, 0, 0, .06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101013; --surface: #18181c; --text: #f4f4f5; --muted: #a1a1aa;
      --line: #26262b; --line-strong: #3f3f46;
      --accent: #14b8a6; --accent-hover: #2dd4bf; --on-accent: #042f2a;
      --accent-text: #4fd8c6; --accent-soft: rgba(45, 212, 191, .10);
      --danger: #f87171; --danger-soft: rgba(248, 113, 113, .10);
      --warn: #fbbf24; --warn-soft: rgba(251, 191, 36, .10);
      --shadow: 0 1px 3px rgba(0, 0, 0, .4);
    }
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-size: 14px; line-height: 1.5;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans",
      "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .icon {
    width: 16px; height: 16px; flex: none;
    fill: none; stroke: currentColor; stroke-width: 1.5;
    stroke-linecap: round; stroke-linejoin: round;
  }

  /* ── header ─────────────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--surface); border-bottom: 1px solid var(--line);
  }
  .bar {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 12px 20px 8px;
  }
  .brand { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
  .logo { width: 22px; height: 22px; color: var(--accent); }
  .logo rect { fill: currentColor; }
  .wordmark { font-size: 16px; font-weight: 650; letter-spacing: -.01em; color: var(--text); }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px;
  }
  .chip .icon { width: 13px; height: 13px; }
  .chip b { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
  .hbtns { display: flex; align-items: center; gap: 8px; }
  .hbtns .btn { flex: none; }
  .hbtns .iconbtn { height: 30px; }

  nav { padding: 0 20px; overflow-x: auto; }
  [role="tablist"] { display: flex; gap: 4px; }
  .tab {
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    font: inherit; font-size: 13px; font-weight: 500; color: var(--muted);
    background: none; border: none; border-bottom: 2px solid transparent;
    padding: 8px 10px 9px; margin-bottom: -1px; cursor: pointer;
  }
  .tab .icon { width: 15px; height: 15px; }
  .tab:hover { color: var(--text); }
  .tab[aria-selected="true"] { color: var(--text); border-bottom-color: var(--accent); }
  .tab .count {
    font-size: 11px; font-variant-numeric: tabular-nums; color: var(--muted);
    background: var(--bg); border: 1px solid var(--line);
    border-radius: 999px; padding: 0 7px; line-height: 16px;
  }
  .tab[aria-selected="true"] .count { color: var(--accent-text); border-color: transparent;
    background: var(--accent-soft); }

  /* ── layout ─────────────────────────────────────────────────── */
  main { max-width: 1200px; margin: 0 auto; padding: 24px 20px 48px; }
  .banner {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    background: var(--danger-soft); border: 1px solid var(--danger);
    color: var(--danger); border-radius: 10px; padding: 10px 14px; font-size: 13px;
  }
  .banner[hidden] { display: none; }
  .banner button { margin-left: auto; }
  .banner.warn { background: var(--warn-soft); border-color: var(--warn);
    color: var(--warn); padding: 8px 14px; }
  .grid {
    display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  }
  .empty {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    padding: 72px 16px; color: var(--muted); text-align: center; font-size: 14px;
  }
  .empty .icon { width: 32px; height: 32px; opacity: .6; }

  /* ── cards ──────────────────────────────────────────────────── */
  .card {
    display: flex; flex-direction: column; overflow: hidden;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; box-shadow: var(--shadow);
    transition: opacity .25s ease, transform .25s ease;
  }
  .card.leave { opacity: 0; transform: scale(.96) translateY(4px); }
  .card.busy { opacity: .55; pointer-events: none; }
  .poster { position: relative; aspect-ratio: 2 / 3; background: var(--bg); }
  /* Poster sits over the always-painted monogram and fades in on load —
     a hanging CDN (common behind filtered networks) must never leave a
     blank card while the request times out. */
  .poster img { position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: block; opacity: 0; transition: opacity .3s ease; }
  .poster img.ok { opacity: 1; }
  .mono {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    background-size: cover;
  }
  .mono .initials {
    font-size: 44px; font-weight: 650; letter-spacing: .02em;
    color: rgba(255, 255, 255, .92); text-shadow: 0 1px 2px rgba(0, 0, 0, .15);
  }
  .mono .wm {
    position: absolute; right: 10px; bottom: 10px; width: 44px; height: 44px;
    color: #ffffff; opacity: .18; stroke-width: 1.25;
  }
  .body { display: flex; flex-direction: column; gap: 8px; padding: 12px; flex: 1; }
  .title { margin: 0; font-size: 14px; font-weight: 600; line-height: 1.35; }
  .meta {
    margin: 0; font-size: 13px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .score { display: flex; align-items: center; gap: 8px; }
  .score .track {
    flex: 1; height: 4px; border-radius: 2px; background: var(--line); overflow: hidden;
  }
  .score .fill { display: block; height: 100%; border-radius: 2px; background: var(--accent); }
  .score .num {
    font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums;
    min-width: 2.6em; text-align: right;
  }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; border-radius: 999px; padding: 2px 8px;
    color: var(--accent-text); background: var(--accent-soft);
  }
  .badge .icon { width: 12px; height: 12px; }
  .badge.bad { color: var(--danger); background: var(--danger-soft); }
  .badge.dim { color: var(--muted); background: var(--bg); border: 1px solid var(--line); }

  .why, .preview {
    background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 10px; font-size: 12.5px; display: flex; flex-direction: column; gap: 6px;
  }
  .why[hidden], .preview[hidden] { display: none; }
  .overview {
    margin: 0; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 4;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .nbs, .tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .nb {
    display: inline-flex; align-items: baseline; gap: 4px; font-size: 12px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 999px; padding: 2px 8px;
  }
  .nb .sim { color: var(--muted); font-variant-numeric: tabular-nums; }
  .tag {
    font-size: 11px; color: var(--muted); background: var(--surface);
    border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px;
    font-family: ui-monospace, monospace;
  }
  .seeds { margin: 0; color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
  .whytext { margin: 0; color: var(--muted); white-space: pre-wrap; }

  .trk { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .trk .tname {
    font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .preview audio { width: 100%; height: 32px; display: block; }
  .ytlink {
    display: inline-flex; align-items: center; gap: 6px; align-self: flex-start;
    font-size: 12px; color: var(--muted); text-decoration: none;
  }
  .ytlink:hover { color: var(--accent-text); }
  .ytlink .icon { width: 13px; height: 13px; }

  .actions { display: flex; gap: 8px; margin-top: auto; }
  .actions.foot { margin-top: 0; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    font: inherit; font-size: 13px; font-weight: 500;
    color: var(--text); background: var(--surface);
    border: 1px solid var(--line-strong); border-radius: 8px;
    padding: 5px 12px; cursor: pointer; flex: 1; text-decoration: none;
  }
  .btn .icon { width: 15px; height: 15px; }
  .btn:hover:not(:disabled) { background: var(--bg); }
  .btn.sample[aria-expanded="true"] {
    color: var(--accent-text); background: var(--accent-soft); border-color: transparent;
  }
  .btn.approve { color: var(--on-accent); background: var(--accent); border-color: var(--accent); }
  .btn.approve:hover:not(:disabled) { background: var(--accent-hover);
    border-color: var(--accent-hover); }
  .btn.quiet { color: var(--muted); background: none; border-color: var(--line); }
  .btn.quiet:hover:not(:disabled) { color: var(--text); background: var(--bg); }
  .btn:disabled { opacity: .45; cursor: default; }
  .iconbtn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; flex: none; color: var(--muted); background: none;
    border: 1px solid transparent; border-radius: 8px; padding: 0; cursor: pointer;
  }
  .iconbtn:hover { color: var(--text); background: var(--bg); }
  .iconbtn[aria-expanded="true"] { color: var(--accent-text); background: var(--accent-soft); }

  /* ── settings dialog ────────────────────────────────────────── */
  dialog {
    width: min(420px, calc(100vw - 32px));
    background: var(--surface); color: var(--text);
    border: 1px solid var(--line); border-radius: 12px;
    box-shadow: var(--shadow); padding: 0;
  }
  dialog::backdrop { background: rgba(0, 0, 0, .4); }
  .dlg-head { display: flex; align-items: center; gap: 8px; padding: 14px 16px 10px; }
  .dlg-head h2 { margin: 0 auto 0 0; font-size: 15px; font-weight: 650; letter-spacing: -.01em; }
  .dlg-head .iconbtn { height: 30px; }
  .dlg-sub { margin: -8px 16px 10px; font-size: 12px; color: var(--muted); }
  .setting {
    display: flex; flex-direction: column; gap: 6px;
    padding: 12px 16px; border-top: 1px solid var(--line);
  }
  .setting .row { display: flex; align-items: center; gap: 10px; }
  .setting .name { margin-right: auto; font-size: 13px; font-weight: 600; }
  .setting .hint { margin: 0; font-size: 12px; color: var(--muted); }
  .setting .caption {
    display: flex; align-items: center; gap: 10px; font-size: 11.5px; color: var(--muted);
  }
  .reset {
    font: inherit; font-size: 11.5px; color: var(--accent-text);
    background: none; border: none; padding: 0; cursor: pointer;
  }
  .reset:hover { text-decoration: underline; }
  .reset[hidden] { display: none; }
  .toggle {
    appearance: none; -webkit-appearance: none; position: relative; flex: none;
    width: 36px; height: 20px; margin: 0; cursor: pointer;
    background: var(--line-strong); border: none; border-radius: 999px;
    transition: background .15s ease;
  }
  .toggle::after {
    content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
    border-radius: 50%; background: var(--surface); box-shadow: var(--shadow);
    transition: transform .15s ease;
  }
  .toggle:checked { background: var(--accent); }
  .toggle:checked::after { transform: translateX(16px); }
  .seg {
    display: inline-flex; border: 1px solid var(--line-strong);
    border-radius: 8px; overflow: hidden;
  }
  .seg button {
    font: inherit; font-size: 12.5px; font-weight: 500; color: var(--muted);
    background: none; border: none; padding: 4px 12px; cursor: pointer;
  }
  .seg button + button { border-left: 1px solid var(--line-strong); }
  .seg button[aria-pressed="true"] { color: var(--accent-text); background: var(--accent-soft); }
  .setting input[type="number"] {
    font: inherit; font-size: 13px; color: var(--text); background: var(--surface);
    border: 1px solid var(--line-strong); border-radius: 8px; padding: 4px 8px; width: 72px;
  }
  .setting input[type="range"] { flex: 1; max-width: 160px; margin: 0;
    accent-color: var(--accent); }
  .setting .pct {
    font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums;
    min-width: 2.8em; text-align: right;
  }

  /* ── skeletons / toasts ─────────────────────────────────────── */
  .skeleton .poster, .skeleton .line { animation: pulse 1.4s ease-in-out infinite; }
  .skeleton .line { height: 12px; border-radius: 4px; background: var(--line); }
  .skeleton .w80 { width: 80%; } .skeleton .w60 { width: 60%; } .skeleton .w40 { width: 40%; }
  @keyframes pulse { 50% { opacity: .45; } }

  #toasts {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 8px; z-index: 20; align-items: center;
  }
  .toast {
    display: flex; align-items: center; gap: 8px; font-size: 13px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
    box-shadow: var(--shadow); padding: 8px 14px; animation: rise .2s ease;
  }
  .toast .icon { width: 15px; height: 15px; color: var(--accent-text); }
  .toast.error .icon { color: var(--danger); }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<svg hidden aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <symbol id="i-check" viewBox="0 0 24 24"><path d="M5 12.5l4.5 4.5L19 7.5"/></symbol>
    <symbol id="i-x" viewBox="0 0 24 24"><path d="M6.5 6.5l11 11M17.5 6.5l-11 11"/></symbol>

    <symbol id="i-compass" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="8.75"/><path d="M15 9l-1.8 4.2L9 15l1.8-4.2z"/>

<header>
  <div class="bar">
    <a class="brand" href="/">
      <svg class="logo" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="4" y="13" width="4" height="7" rx="2" opacity=".4"/>
        <rect x="10" y="9" width="4" height="11" rx="2" opacity=".7"/>
        <rect x="16" y="4" width="4" height="16" rx="2"/>
      </svg>
      <span class="wordmark">Gustarr</span>
    </a>
    <div id="chips" class="chips"></div>
    <div class="hbtns">
      <button id="run-now" class="btn quiet" type="button">
        <svg class="icon" aria-hidden="true"><use href="#i-play"/></svg>Run Now</button>
      <button id="open-settings" class="iconbtn" type="button" aria-label="Settings"
        aria-haspopup="dialog">
        <svg class="icon" aria-hidden="true"><use href="#i-gear"/></svg></button>
    </div>
  </div>
  <nav><div id="tabs" role="tablist" aria-label="Queue filters"></div></nav>
</header>

<main>
  <div id="paused" class="banner warn" role="status" hidden>
    <span>Automation Paused — approvals and auto-adds are on hold</span>
    <button id="resume" class="btn">Resume</button>
  </div>
  <div id="banner" class="banner" role="alert" hidden>
    <span id="banner-text"></span>
    <button id="retry" class="btn">Retry</button>
  </div>
  <div id="panel" role="tabpanel" aria-labelledby="tab-all"></div>
</main>

<div id="toasts" aria-live="polite"></div>

<dialog id="settings" aria-labelledby="settings-title">
  <div class="dlg-head">
    <h2 id="settings-title">Settings</h2>
    <button id="settings-close" class="iconbtn" type="button" aria-label="Close settings">
      <svg class="icon" aria-hidden="true"><use href="#i-x"/></svg></button>
  </div>
  <p class="dlg-sub">Operator-level — global, shared by every profile</p>
  <div id="settings-body"></div>
</dialog>

<script>
(function () {
  'use strict';

  const TMDB = 'https://image.tmdb.org/t/p/w342';
  // Forward-auth deployments pick the profile from a proxy header on every
  // request; ?profile= is the header-less fallback (bookmarkable per person)
  // and must survive into each API call the page makes.
  const PROFILE = new URLSearchParams(location.search).get('profile');
  const api = path => PROFILE
    ? path + (path.includes('?') ? '&' : '?') + 'profile=' + encodeURIComponent(PROFILE)
    : path;
  // Client-side twin of the server's /api/recs?domain=music alias: the page
  // fetches every domain in one status=all request and tabs filter locally,
  // so the Music tab's artist+album+track span lives in this set.
  const MUSIC = new Set(['artist', 'album', 'track']);
  const TABS = [
    { id: 'all', label: 'All' },
    { id: 'movie', label: 'Movies', icon: 'film' },
    { id: 'series', label: 'Series', icon: 'tv' },
    { id: 'music', label: 'Music', icon: 'music' },
    { id: 'history', label: 'History', icon: 'clock' },
  ];
  const STATUS_LABEL = {
    approved: 'Approved', rejected: 'Rejected', added: 'Added',
    auto_added: 'Auto-Added', expired: 'Expired', failed: 'Failed', snoozed: 'Snoozed',
  };
  const SETTINGS = [
    { key: 'paused', label: 'Pause Automation', type: 'toggle' },
    { key: 'music_mode', label: 'Music Mode', type: 'seg', options: ['auto', 'queue'] },
    { key: 'music_max_artists_per_week', label: 'Weekly Artist Cap', type: 'number', min: 0 },
    { key: 'music_max_albums_per_week', label: 'Weekly Album Cap', type: 'number', min: 0 },
    { key: 'video_queue_max_pending', label: 'Video Queue Depth', type: 'number', min: 1 },
    { key: 'exploration_frac', label: 'Exploration Fraction', type: 'range',
      hint: 'Share of each run reserved for outside-your-bubble picks' },
  ];
  const state = { rows: [], stats: null, tab: 'all', loaded: false, settings: null,
                  profile: null };
  const $ = id => document.getElementById(id);

  const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g,
    c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const icon = name =>
    `<svg class="icon" aria-hidden="true"><use href="#i-${name}"/></svg>`;
  const clamp01 = n => Math.max(0, Math.min(1, Number(n) || 0));
  const titleCase = s => s.charAt(0).toUpperCase() + s.slice(1);
  const simFmt = n => {
    const t = Number(n).toFixed(2);
    return t.startsWith('0.') ? t.slice(1) : t;
  };
  const reducedMotion = () => matchMedia('(prefers-reduced-motion: reduce)').matches;

  async function getJSON(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }

  async function errDetail(resp) {
    let detail = '';
    try { detail = (await resp.json()).detail || ''; } catch (e) { /* non-json body */ }
    return detail || 'HTTP ' + resp.status;
  }

  function genresOf(r) {
    let g = r.genres;
    if (typeof g === 'string') g = g.split(',').map(s => s.trim());
    return Array.isArray(g) ? g.filter(Boolean) : [];
  }

  function hueOf(s) {
    let h = 0;
    for (const c of String(s)) h = (h * 31 + c.codePointAt(0)) >>> 0;
    return h % 360;
  }

  function initialsOf(title) {
    const words = String(title || '').trim().split(/\s+/).filter(Boolean);
    if (!words.length) return '?';
    const take = w => { const m = w.match(/[\p{L}\p{N}]/u); return m ? m[0] : w[0]; };
    return words.slice(0, 2).map(take).join('').toUpperCase();
  }

  const domainIcon = d => d === 'movie' ? 'film' : d === 'series' ? 'tv' : 'music';

  /* ── header chips + tab counts ─────────────────────────────── */

  function chip(ic, label, value) {
    return `<span class="chip">${icon(ic)}${esc(label)} <b>${esc(value)}</b></span>`;
  }

  function updateCounts() {
    const open = state.rows.filter(r => r.status === 'proposed');
    const acted = state.rows.filter(r => r.status !== 'proposed');
    const weekAgo = Date.now() - 7 * 864e5;
    const approvedWeek = acted.filter(r =>
      (r.status === 'approved' || r.status === 'added') &&
      r.acted_at && Date.parse(r.acted_at) >= weekAgo).length;
    const parts = [];
    // Quiet profile chip: only interesting when the instance actually
    // serves more than one person.
    if (state.profile && (state.profile.profiles || []).length > 1)
      parts.push(chip('user', 'Profile', state.profile.name));
    parts.push(chip('clock', 'Open queue', open.length),
               chip('check', 'Approved this week', approvedWeek));
    const div = state.stats && state.stats.diversity;
    if (div && typeof div.genre_entropy_recs === 'number')
      parts.push(chip('chart', 'Genre entropy', div.genre_entropy_recs.toFixed(2)));
    $('chips').innerHTML = parts.join('');

    const counts = {
      all: open.length,
      movie: open.filter(r => r.domain === 'movie').length,
      series: open.filter(r => r.domain === 'series').length,
      music: open.filter(r => MUSIC.has(r.domain)).length,
      history: acted.length,
    };
    for (const t of TABS) {
      const pill = $('tab-' + t.id).querySelector('.count');
      pill.textContent = counts[t.id];
      pill.hidden = false;
    }
  }

  /* ── tabs ──────────────────────────────────────────────────── */

  function renderTabs() {
    $('tabs').innerHTML = TABS.map(t =>
      `<button class="tab" role="tab" id="tab-${t.id}" data-tab="${t.id}"
        aria-selected="${t.id === state.tab}" tabindex="${t.id === state.tab ? 0 : -1}">
        ${t.icon ? icon(t.icon) : ''}<span>${t.label}</span><span class="count" hidden></span>
      </button>`).join('');
    $('tabs').addEventListener('click', e => {
      const b = e.target.closest('[role="tab"]');
      if (b) selectTab(b.dataset.tab);
    });
    $('tabs').addEventListener('keydown', e => {
      const step = { ArrowRight: 1, ArrowLeft: -1, Home: 0, End: 0 };
      if (!(e.key in step)) return;
      e.preventDefault();
      const ids = TABS.map(t => t.id);
      let i = ids.indexOf(state.tab);
      if (e.key === 'Home') i = 0;
      else if (e.key === 'End') i = ids.length - 1;
      else i = (i + step[e.key] + ids.length) % ids.length;
      selectTab(ids[i]);
      $('tab-' + ids[i]).focus();
    });
  }

  function selectTab(id) {
    state.tab = id;
    for (const t of TABS) {
      const b = $('tab-' + t.id);
      b.setAttribute('aria-selected', String(t.id === id));
      b.tabIndex = t.id === id ? 0 : -1;
    }
    $('panel').setAttribute('aria-labelledby', 'tab-' + id);
    if (state.loaded) renderPanel();
  }

  /* ── cards ─────────────────────────────────────────────────── */

  function monogramHTML(r) {
    const h = hueOf(r.title || r.item_id);
    const bg = `linear-gradient(160deg, hsl(${h} 40% 48%), hsl(${(h + 42) % 360} 45% 30%))`;
    return `<div class="mono" style="background-image:${bg}">
      <span class="initials">${esc(initialsOf(r.title || r.item_id))}</span>
      <svg class="icon wm" aria-hidden="true"><use href="#i-${domainIcon(r.domain)}"/></svg>
    </div>`;
  }

  function posterHTML(r) {
    // meta.image (artist/album art) is already a full URL; poster_path is a
    // TMDB fragment that needs the CDN prefix and never applies to artists.
    const src = r.image ? r.image
      : r.poster_path && r.domain !== 'artist' ? TMDB + r.poster_path : null;
    if (src)
      return `<div class="poster">${monogramHTML(r)}<img loading="lazy" decoding="async"
        alt="" src="${esc(src)}"></div>`;
    return `<div class="poster">${monogramHTML(r)}</div>`;
  }

  function badgesHTML(r, history) {
    const w = r.why || {};
    const b = [];
    // The Music tab mixes artists and albums; the chip says which one this
    // card is (meta.type refines albums into e.g. "Single" or "EP").
    if (MUSIC.has(r.domain))
      b.push(`<span class="badge dim type">${esc(titleCase(String(r.type || r.domain)))}</span>`);
    if (w.exploration) b.push(`<span class="badge">${icon('compass')}Exploration</span>`);
    if (w.serendipity) b.push(`<span class="badge">${icon('sparkle')}Serendipity</span>`);
    if (history) {
      const cls = r.status === 'rejected' ? 'bad'
        : (r.status === 'expired' || r.status === 'failed' || r.status === 'snoozed')
          ? 'dim' : '';
      b.push(`<span class="badge ${cls}">${esc(STATUS_LABEL[r.status] || r.status)}</span>`);
      if (r.acted_at)
        b.push(`<span class="badge dim">${icon('clock')}${esc(String(r.acted_at).slice(0, 10))}
          </span>`);
    }
    return b.length ? `<div class="badges">${b.join('')}</div>` : '';
  }

  // Structured "why" from the row when neighbor titles are resolved; null
  // means the /why text endpoint (which resolves titles server-side) is needed.
  function structuredWhy(r) {
    const w = r.why || {};
    const nbs = w.neighbors || w.neighbours || [];
    const resolved = nbs.length > 0 &&
      nbs.every(n => n && !Array.isArray(n) && n.title);
    if (nbs.length && !resolved) return null;
    const sources = w.sources || [];
    // seeds are surrogate int item ids since schema v3; only the server can
    // name those, so any non-string seed defers the whole panel to /why
    const seeds = w.seeds || [];
    if (seeds.some(s => typeof s !== 'string')) return null;
    if (!resolved && !sources.length && !seeds.length) return null;
    const parts = [];
    if (resolved) parts.push('<div class="nbs">' + nbs.map(n =>
      `<span class="nb">Because you liked ${esc(n.title)}${typeof n.sim === 'number'
        ? ` <span class="sim">· ${simFmt(n.sim)}</span>` : ''}</span>`).join('') + '</div>');
    if (sources.length) parts.push('<div class="tags">' +
      sources.map(s => `<span class="tag">${esc(s)}</span>`).join('') + '</div>');
    if (seeds.length)
      parts.push(`<p class="seeds">Seeded by ${esc(seeds.join(', '))}</p>`);
    return parts.join('');
  }

  async function toggleWhy(el, r) {
    const box = el.querySelector('.why');
    const btn = el.querySelector('.whybtn');
    const show = box.hidden;
    box.hidden = !show;
    btn.setAttribute('aria-expanded', String(show));
    if (!show || box.dataset.loaded) return;
    box.dataset.loaded = '1';
    const head = r.overview ? `<p class="overview">${esc(r.overview)}</p>` : '';
    const local = structuredWhy(r);
    if (local !== null) { box.innerHTML = head + local; return; }
    box.innerHTML = head + '<p class="whytext">Loading…</p>';
    const out = box.querySelector('.whytext');
    try { out.textContent = (await getJSON(api(`/api/recs/${r.id}/why`))).text; }
    catch (e) { out.textContent = 'Could not load explanation: ' + (e.message || e); }
  }

  /* ── sampling (trailer / audio preview) ────────────────────── */
  // Available even in History: sampling is harmless post-verdict,
  // unlike approve/reject, which stay disabled there.

  function sampleHTML(r) {
    if (r.trailer && (r.domain === 'movie' || r.domain === 'series'))
      return `<a class="btn sample" target="_blank" rel="noopener"
        href="https://www.youtube.com/watch?v=${esc(encodeURIComponent(r.trailer))}">
        ${icon('play')}Trailer</a>`;
    if (r.domain === 'artist')
      return `<button class="btn sample previewbtn" aria-expanded="false">
        ${icon('play')}Preview</button>`;
    return '';
  }

  const ytSearchHTML = name => `<a class="ytlink" target="_blank" rel="noopener"
    href="https://www.youtube.com/results?search_query=${esc(encodeURIComponent(name))}">
    ${icon('external')}Search on YouTube</a>`;

  function pauseOthers(current) {
    for (const a of document.querySelectorAll('audio'))
      if (a !== current) a.pause();
  }

  async function togglePreview(el, r) {
    const box = el.querySelector('.preview');
    const btn = el.querySelector('.previewbtn');
    const show = box.hidden;
    box.hidden = !show;
    btn.setAttribute('aria-expanded', String(show));
    if (!show) { for (const a of box.querySelectorAll('audio')) a.pause(); return; }
    if (box.dataset.loaded) return;
    box.dataset.loaded = '1'; // cache per card, including the fallback state
    const name = r.title || r.item_id;
    box.innerHTML = '<div class="skeleton"><div class="line w60"></div></div>';
    let tracks = [];
    // Keyless, CORS-open endpoint; any failure falls back to a YouTube search link.
    try {
      const data = await getJSON('https://itunes.apple.com/search?term=' +
        encodeURIComponent(name) + '&entity=song&limit=3&country=US');
      tracks = (data.results || []).filter(t => t && t.previewUrl).slice(0, 3);
    } catch (e) { /* fallback below */ }
    if (!tracks.length) { box.innerHTML = ytSearchHTML(name); return; }
    box.innerHTML = tracks.map(t => `<div class="trk">
      <span class="tname" title="${esc(t.trackName)}">${esc(t.trackName)}</span>
      <audio controls preload="none" src="${esc(t.previewUrl)}"></audio>
    </div>`).join('');
    for (const a of box.querySelectorAll('audio'))
      a.addEventListener('play', () => pauseOthers(a));
  }

  function cardEl(r, history) {
    const el = document.createElement('article');
    el.className = 'card';
    const score = Number(r.score) || 0;
    const genres = genresOf(r);
    const meta = [r.year, genres.join(', ')].filter(Boolean).join(' · ');
    const foot = [];
    if (!history)
      foot.push(`<button class="btn quiet snooze">${icon('clock')}Not Now</button>`);
    if (history && r.status === 'rejected')
      foot.push(`<button class="btn forgive">${icon('check')}Forgive</button>`);
    const sample = sampleHTML(r);
    if (sample) foot.push(sample);
    el.innerHTML = `
      ${posterHTML(r)}
      <div class="body">
        <h3 class="title">${esc(r.title || r.item_id)}</h3>
        ${r.domain === 'album' && r.artist
          ? `<p class="meta byline">by ${esc(r.artist)}</p>` : ''}
        ${meta ? `<p class="meta" title="${esc(meta)}">${esc(meta)}</p>` : ''}
        <div class="score">
          <span class="track"><span class="fill"
            style="width:${Math.round(100 * clamp01(score))}%"></span></span>
          <span class="num">${score.toFixed(2)}</span>
        </div>
        ${badgesHTML(r, history)}
        <div class="why" hidden></div>
        ${r.domain === 'artist' ? '<div class="preview" hidden></div>' : ''}
        <div class="actions">
          <button class="btn approve" ${history ? 'disabled' : ''}>
            ${icon('check')}Approve</button>
          <button class="btn reject" ${history ? 'disabled' : ''}>
            ${icon('x')}Reject</button>
          <button class="iconbtn whybtn" aria-expanded="false"
            aria-label="Why this recommendation">${icon('info')}</button>
        </div>
        ${foot.length ? `<div class="actions foot">${foot.join('')}</div>` : ''}
      </div>`;
    const img = el.querySelector('.poster img');
    if (img) {
      img.addEventListener('load', () => img.classList.add('ok'), { once: true });
      img.addEventListener('error', () => img.remove(), { once: true });
      if (img.complete && img.naturalWidth > 0) img.classList.add('ok');
    }
    if (!history) {
      el.querySelector('.approve').addEventListener('click', () => act(el, r, 'approve'));
      el.querySelector('.reject').addEventListener('click', () => act(el, r, 'reject'));
      el.querySelector('.snooze').addEventListener('click', () => act(el, r, 'snooze'));
    }
    const fg = el.querySelector('.forgive');
    if (fg) fg.addEventListener('click', () => forgive(el, r));
    el.querySelector('.whybtn').addEventListener('click', () => toggleWhy(el, r));
    const pv = el.querySelector('.previewbtn');
    if (pv) pv.addEventListener('click', () => togglePreview(el, r));
    return el;
  }

  /* ── actions ───────────────────────────────────────────────── */

  function toast(msg, kind) {
    const t = document.createElement('div');
    t.className = 'toast' + (kind === 'error' ? ' error' : '');
    t.innerHTML = icon(kind === 'error' ? 'x' : 'check');
    t.appendChild(document.createTextNode(msg));
    $('toasts').appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  function removeCard(el) {
    let gone = false;
    const grid = el.parentElement;
    const done = () => {
      if (gone) return;
      gone = true;
      el.remove();
      if (grid && !grid.querySelector('.card')) renderPanel();
    };
    if (reducedMotion()) { done(); return; }
    el.classList.add('leave');
    el.addEventListener('transitionend', done, { once: true });
    setTimeout(done, 350);
  }

  const ACT = {
    approve: { status: 'approved', toast: r => `Approved · ${r.title || r.item_id}` },
    reject: { status: 'rejected', toast: r => `Rejected · ${r.title || r.item_id}` },
    snooze: { status: 'snoozed', toast: () => 'Snoozed for 30 days' },
  };

  async function act(el, r, action) {
    el.classList.add('busy');
    try {
      const resp = await fetch(api(`/api/recs/${r.id}/${action}`), { method: 'POST' });
      if (!resp.ok) throw new Error(await errDetail(resp));
      r.status = ACT[action].status;
      r.acted_at = new Date().toISOString().slice(0, 19) + 'Z';
      toast(ACT[action].toast(r));
      removeCard(el);
      updateCounts();
    } catch (e) {
      el.classList.remove('busy');
      toast(`Could not ${action} · ${e.message || e}`, 'error');
    }
  }

  async function forgive(el, r) {
    el.classList.add('busy');
    try {
      const resp = await fetch(api(`/api/recs/${r.id}/forgive`), { method: 'POST' });
      if (!resp.ok) throw new Error(await errDetail(resp));
      r.status = 'expired';
      r.acted_at = new Date().toISOString().slice(0, 19) + 'Z';
      toast(`Forgiven · ${r.title || r.item_id}`);
      el.replaceWith(cardEl(r, true));
      updateCounts();
    } catch (e) {
      el.classList.remove('busy');
      toast(`Could not forgive · ${e.message || e}`, 'error');
    }
  }

  /* ── settings & runtime controls ───────────────────────────── */

  async function putSetting(key, value) {
    const resp = await fetch('/api/settings/' + key, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value }),
    });
    if (!resp.ok) throw new Error(await errDetail(resp));
    return resp.json();
  }

  async function delSetting(key) {
    const resp = await fetch('/api/settings/' + key, { method: 'DELETE' });
    if (!resp.ok) throw new Error(await errDetail(resp));
  }

  function fmtSetting(desc, v) {
    if (desc.type === 'toggle') return v ? 'On' : 'Off';
    if (desc.type === 'range') return Math.round(100 * v) + '%';
    if (desc.type === 'seg') return titleCase(String(v));
    return String(v);
  }

  function settingRowHTML(desc) {
    let control = '';
    if (desc.type === 'toggle')
      control = `<input class="toggle" type="checkbox" data-key="${desc.key}"
        aria-label="${esc(desc.label)}">`;
    else if (desc.type === 'seg')
      control = `<div class="seg" role="group" aria-label="${esc(desc.label)}">` +
        desc.options.map(o => `<button type="button" data-key="${desc.key}"
          data-value="${esc(o)}" aria-pressed="false">${esc(titleCase(o))}</button>`).join('') +
        '</div>';
    else if (desc.type === 'number')
      control = `<input type="number" data-key="${desc.key}" min="${desc.min}" step="1"
        aria-label="${esc(desc.label)}">`;
    else if (desc.type === 'range')
      control = `<span class="pct"></span><input type="range" data-key="${desc.key}"
        min="0" max="0.9" step="0.01" aria-label="${esc(desc.label)}">`;
    return `<div class="setting" data-setting="${desc.key}">
      <div class="row"><span class="name">${esc(desc.label)}</span>${control}</div>
      ${desc.hint ? `<p class="hint">${esc(desc.hint)}</p>` : ''}
      <div class="caption"><span class="def"></span>
        <button type="button" class="reset" data-reset="${desc.key}" hidden>Reset</button>
      </div>
    </div>`;
  }

  function syncSettingRow(desc) {
    const s = state.settings && state.settings[desc.key];
    const row = document.querySelector(`[data-setting="${desc.key}"]`);
    if (!s || !row) return;
    if (desc.type === 'toggle') row.querySelector('input').checked = s.value === true;
    else if (desc.type === 'seg')
      for (const b of row.querySelectorAll('.seg button'))
        b.setAttribute('aria-pressed', String(b.dataset.value === s.value));
    else if (desc.type === 'number') row.querySelector('input').value = s.value;
    else if (desc.type === 'range') {
      row.querySelector('input').value = s.value;
      row.querySelector('.pct').textContent = Math.round(100 * s.value) + '%';
    }
    row.querySelector('.def').textContent = 'default: ' + fmtSetting(desc, s.default);
    row.querySelector('.reset').hidden = !s.overridden;
  }

  function syncPaused() {
    const s = state.settings && state.settings.paused;
    $('paused').hidden = !(s && s.value === true);
  }

  // Optimistic: the UI flips first; a failed write reverts it with a toast.
  async function writeSetting(desc, value) {
    const s = state.settings[desc.key];
    const prev = { ...s };
    s.value = value;
    s.overridden = true;
    syncSettingRow(desc);
    syncPaused();
    try {
      await putSetting(desc.key, value);
      return true;
    } catch (e) {
      state.settings[desc.key] = prev;
      syncSettingRow(desc);
      syncPaused();
      toast(`Could not update ${desc.label} · ${e.message || e}`, 'error');
      return false;
    }
  }

  async function resetSetting(desc) {
    const s = state.settings[desc.key];
    const prev = { ...s };
    s.value = s.default;
    s.overridden = false;
    syncSettingRow(desc);
    syncPaused();
    try {
      await delSetting(desc.key);
    } catch (e) {
      state.settings[desc.key] = prev;
      syncSettingRow(desc);
      syncPaused();
      toast(`Could not reset ${desc.label} · ${e.message || e}`, 'error');
    }
  }

  async function openSettings() {
    try { state.settings = await getJSON('/api/settings'); }
    catch (e) {
      if (!state.settings) {
        toast('Could not load settings · ' + (e.message || e), 'error');
        return;
      }
    }
    $('settings-body').innerHTML = SETTINGS.map(settingRowHTML).join('');
    for (const desc of SETTINGS) syncSettingRow(desc);
    syncPaused();
    $('settings').showModal();
  }

  function bindSettings() {
    $('open-settings').addEventListener('click', openSettings);
    $('settings-close').addEventListener('click', () => $('settings').close());
    const body = $('settings-body');
    body.addEventListener('change', e => {
      const t = e.target;
      const desc = SETTINGS.find(d => d.key === t.dataset.key);
      if (!desc || t.tagName !== 'INPUT') return;
      if (desc.type === 'toggle') writeSetting(desc, t.checked);
      else if (desc.type === 'number')
        writeSetting(desc, Math.max(desc.min, Math.round(Number(t.value) || 0)));
      else if (desc.type === 'range') writeSetting(desc, Number(t.value));
    });
    body.addEventListener('input', e => {
      if (e.target.type !== 'range') return;
      const pct = e.target.closest('.setting').querySelector('.pct');
      pct.textContent = Math.round(100 * Number(e.target.value)) + '%';
    });
    body.addEventListener('click', e => {
      const rst = e.target.closest('.reset');
      if (rst) {
        const desc = SETTINGS.find(d => d.key === rst.dataset.reset);
        if (desc) resetSetting(desc);
        return;
      }
      const segBtn = e.target.closest('.seg button');
      if (!segBtn) return;
      const desc = SETTINGS.find(d => d.key === segBtn.dataset.key);
      if (desc && state.settings[desc.key].value !== segBtn.dataset.value)
        writeSetting(desc, segBtn.dataset.value);
    });
    $('resume').addEventListener('click', async () => {
      const desc = SETTINGS.find(d => d.key === 'paused');
      if (state.settings && await writeSetting(desc, false)) toast('Automation Resumed');
    });
    $('run-now').addEventListener('click', async () => {
      const b = $('run-now');
      b.disabled = true;
      try {
        const resp = await fetch('/api/run', { method: 'POST' });
        if (!resp.ok) throw new Error(await errDetail(resp));
        toast('Pipeline requested — refresh in a few minutes');
      } catch (e) {
        toast('Could not request run · ' + (e.message || e), 'error');
      }
      b.disabled = false;
    });
  }

  /* ── panel ─────────────────────────────────────────────────── */

  function rowsFor(tab) {
    if (tab === 'history')
      return state.rows.filter(r => r.status !== 'proposed').slice().sort((a, b) =>
        String(b.acted_at || b.ts || '').localeCompare(String(a.acted_at || a.ts || '')));
    const open = state.rows.filter(r => r.status === 'proposed');
    if (tab === 'all') return open;
    if (tab === 'music') return open.filter(r => MUSIC.has(r.domain));
    return open.filter(r => r.domain === tab);
  }

  function renderPanel() {
    const panel = $('panel');
    const rows = rowsFor(state.tab);
    if (!rows.length) {
      const history = state.tab === 'history';
      panel.innerHTML = `<div class="empty">
        ${icon(history ? 'clock' : 'sparkle')}
        <p>${history ? 'No history yet — approvals and rejections will land here.'
                     : 'No open proposals — the nightly run refills this queue.'}</p>
      </div>`;
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'grid';
    for (const r of rows) grid.appendChild(cardEl(r, state.tab === 'history'));
    panel.replaceChildren(grid);
  }

  function showSkeletons() {
    const one = `<div class="card skeleton"><div class="poster"></div>
      <div class="body"><div class="line w80"></div><div class="line w60"></div>
      <div class="line w40"></div></div></div>`;
    $('panel').innerHTML = `<div class="grid">${one.repeat(8)}</div>`;
  }

  /* ── boot ──────────────────────────────────────────────────── */

  async function load() {
    $('banner').hidden = true;
    showSkeletons();
    try {
      const [rows, stats, runtime, profile] = await Promise.all([
        getJSON(api('/api/recs?status=all')),
        getJSON(api('/api/stats')).catch(() => null), // chips are decorative
        getJSON('/api/settings').catch(() => null), // paused banner is best-effort
        getJSON(api('/api/profile')).catch(() => null), // profile chip likewise
      ]);
      state.rows = rows;
      state.stats = stats;
      state.profile = profile;
      if (runtime) state.settings = runtime;
      state.loaded = true;
      updateCounts();
      syncPaused();
      renderPanel();
    } catch (e) {
      $('panel').innerHTML = '';
      $('banner-text').textContent =
        'Could not reach the Gustarr API — ' + (e.message || e);
      $('banner').hidden = false;
    }
  }

  renderTabs();
  bindSettings();
  $('retry').addEventListener('click', load);
  load();
})();
</script>
</body>
</html>
